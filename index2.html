<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ShowTracker - Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style2.css">
  
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
  <div class="container">
    <a class="navbar-brand" href="#">ShowTrackr</a>

    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-3">
        <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="add.html">Add</a></li>
      </ul>
    </div>

    <div>
      <a href="login.html" class="me-3 text-muted">Login</a>
      <a href="signup.html" class="text-muted">Sign Up</a>
    </div>
  </div>
</nav>

<!-- Alphabet Filter -->
<div class="container text-center mt-3 alphabet">
  <div>
    0-9
    <script>
      for (let i = 65; i <= 90; i++) {
        document.write('<a href="#">' + String.fromCharCode(i) + '</a>');
      }
    </script>
  </div>
</div>

<!-- Categories -->
<div class="container text-center mt-3 categories">
  <span>Action</span>
  <span>Adventure</span>
  <span>Animation</span>
  <span>Comedy</span>
  <span>Crime</span>
  <span>Documentary</span>
  <span>Drama</span>
  <span>Family</span>
  <span>Fantasy</span>
  <span>History</span>
  <span>Horror</span>
  <span>Romance</span>
  <span>Sci-Fi</span>
  <span>Sport</span>
  <span>Thriller</span>
</div>

<!-- Main Section -->
<div class="container mt-4">
  <div class="section-box">

    <!-- Header Row -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h6 class="mb-0">TOP 12 SHOWS</h6>
      <input type="text" class="form-control w-25" placeholder="Search...">
    </div>

    <!-- Cards -->
    <div class="row g-3">

      <!-- Card 1 -->
      <div class="col-md-3">
        <div class="card">
          <img src="https://media.posterstore.com/site_images/68631bb525436f8361d7684b_270365418_WB0034-5.jpg?auto=compress%2Cformat&fit=max&w=3840" class="card-img-top">
          <div class="card-body text-center">
            <div class="card-title">Game of Thrones</div>
            <div class="card-text">Episodes: 73</div>
          </div>
        </div>
      </div>

      <!-- Card 2 -->
      <div class="col-md-3">
        <div class="card">
          <img src="https://m.media-amazon.com/images/I/812BhXzap+L._AC_UF894,1000_QL80_.jpg" class="card-img-top">
          <div class="card-body text-center">
            <div class="card-title">Breaking Bad</div>
            <div class="card-text">Episodes: 62</div>
          </div>
        </div>
      </div>

      <!-- Card 3 -->
      <div class="col-md-3">
        <div class="card">
          <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS9J7uZPwpmDRYzTsfkHnxhPuZAJPKFmEUYgw&s"class="card-img-top">
          <div class="card-body text-center">
            <div class="card-title">Dexter</div>
            <div class="card-text">Episodes: 96</div>
          </div>
        </div>
      </div>

      <!-- Card 4 -->
      <div class="col-md-3">
        <div class="card">
          <img src="https://i0.wp.com/jacksonupperco.com/wp-content/uploads/2025/09/2018-02-14_5a84c5e41adbd_DVD-HowIMetYourMotherS8-950x626-1.jpg?ssl=1" class="card-img-top">
          <div class="card-body text-center">
            <div class="card-title">How I Met Your Mother</div>
            <div class="card-text">Episodes: 208</div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

</body>
</html>
