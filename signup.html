<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up - ShowTracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
  
</head>
<body>

  <header class="shadow">
<nav class="navbar navbar-expand-lg  border-bottom">
  <div class="container">
    <a class="navbar-brand" href="#">ShowTracker</a>

    <ul class="navbar-nav ms-3">
      <li class="nav-item"><a class="nav-link" href="index.html">Home</a>
      </li>
      <li class="nav-item"></li><a class="nav-link" href="add.html">Add</a>
      </li>
    </ul>

     <div class="ms-auto">
      
    <a href="login.html" class="me-3 text-muted">Login</a>
    <a href="#" class="text-muted">Sign up</a>
  
</div>
</div>
</nav>
    </header>

  


<!-- Signup Section -->
<div class="container mt-5">
  <div class="signup-box">

    <div class="signup-title">Sign Up</div>

    <form>
      <div class="mb-3">
        <label>Name</label>
        <input type="text" class="form-control" placeholder="Enter your name">
      </div>

      <div class="mb-3">
        <label >Email</label>
        <input type="email" class="form-control" placeholder="Enter your email">
      </div>

      <div class="mb-3">
        <label >Password</label>
        <input type="password" class="form-control" placeholder="Create password">
      </div>

      <div class="form-text mb-3">
        By clicking Sign up, you agree to our terms & privacy policy.
      </div>

      <div class="d-grid">
        <button class="btn btn-primary">Sign Up</button>
      </div>

      <div class="text-center mt-3">
        Already have an account? <a href="login.html">Login</a>
      </div>
    </form>

  </div>
</div>

<script src="js/data.js"></script>
<script src="js/signup.js"></script>
</body>
</html>
