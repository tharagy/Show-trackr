<!DOCTYPE html>

  <!-- Bootstrap -->

  <link rel="stylesheet" href="style.css">

  
</head>
<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg  border-bottom">
  <div class="container">
    <a class="navbar-brand" href="#">ShowTracker</a>

    <ul class="navbar-nav ms-3">
      <li class="nav-item">
        <a class="nav-link" href="index.html">Home</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="add.html">Add</a>

    <div class="ms-auto">

   text-muted ">Login</a>

<!-- Login Section -->
<div class="container mt-5">
  <div class="login-box">

    <div class="login-title">Login</div>

    <form>
      <div class="mb-3">
        <label >Email</label>
        <input type="email" id="email" class="form-control" placeholder="Enter email"required>
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" placeholder="Enter password"required>
      </div>

      <div class="d-grid">
        <button type="submit" class="btn btn-primary">Login</button>
      </div>

      <div class="text-center mt-3 ">
        Forgot your password? <a href="#">Sign up</a>

      <div class="text-center mt-3 form-text">
        Don't have an account? <a href="#">Sign up</a>
      </div>

      <div class="d-grid">
        <button type="submit" class="btn btn-primary">Sign in with Facebook</button>
      </div>
      <br>
      <div class="d-grid">
        <button type="submit" class="btn btn-primary">Sign in with Google</button>
      </div>
    </form>
    

  </div>
</div>

<script src="data.js"></script>
<script src="login.js"></script>
</body>
